<!DOCTYPE html>
<html>
<head>
  <title>MT5 Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      padding: 15px;
      border-radius: 10px;
      background: #1e293b;
      text-align: center;
    }

    .long { border: 2px solid #22c55e; }
    .short { border: 2px solid #ef4444; }
    .mixed { border: 2px solid #64748b; }

    .tf-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      text-align: center;
      gap: 6px;
      margin: 10px 0;
    }

    /* 👇 dropdown styling (clean & pro) */
    .tf-select {
      width: 100%;
      padding: 4px;
      font-size: 12px;
      border-radius: 5px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
      text-align: center;
      appearance: none;
    }

    .tf-select:hover {
      border-color: #64748b;
    }

    .badge {
      padding: 4px 6px;
      border-radius: 5px;
      font-size: 12px;
      display: inline-block;
      width: 100%;
      box-sizing: border-box;
    }

    .buy { background: #22c55e; }
    .sell { background: #ef4444; }
    .neutral { background: #64748b; }

    .label {
      margin-top: 10px;
      font-weight: bold;
    }

  </style>
</head>

<body>

<h1>📊 Forex Trend Dashboard</h1>
<div class="grid" id="grid"></div>

<script>
function getClass(tf) {
  if (tf === "LONG") return "buy";
  if (tf === "SHORT") return "sell";
  return "neutral";
}

function loadData() {

  const API_URL = window.location.hostname === "localhost"
    ? "/data.json"
    : "./data.json";

  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      const grid = document.getElementById("grid");
      if (!grid) return;

      grid.innerHTML = "";

      if (!data || Object.keys(data).length === 0) {
        grid.innerHTML = "<p>Geen data beschikbaar...</p>";
        return;
      }

      Object.keys(data).forEach(symbol => {
        const p = data[symbol];

        let trendClass = "mixed";
        let label = "MIXED";

        if (p.TF1 === p.TF2 && p.TF2 === p.TF3) {
          if (p.TF1 === "LONG") {
            trendClass = "long";
            label = "STRONG BUY";
          } else if (p.TF1 === "SHORT") {
            trendClass = "short";
            label = "STRONG SELL";
          }
        }

        const card = document.createElement("div");
        card.className = "card " + trendClass;

        card.innerHTML = `
          <b>${symbol}</b>

          <div class="tf-grid">

            <!-- TIMEFRAME SELECTORS -->
            <select class="tf-select" data-symbol="${symbol}" data-tf="TF1">
              <option ${p.TF1 === "D1" ? "selected" : ""}>D1</option>
              <option ${p.TF1 === "H4" ? "selected" : ""}>H4</option>
              <option ${p.TF1 === "H1" ? "selected" : ""}>H1</option>
            </select>

            <select class="tf-select" data-symbol="${symbol}" data-tf="TF2">
              <option ${p.TF2 === "D1" ? "selected" : ""}>D1</option>
              <option ${p.TF2 === "H4" ? "selected" : ""}>H4</option>
              <option ${p.TF2 === "H1" ? "selected" : ""}>H1</option>
            </select>

            <select class="tf-select" data-symbol="${symbol}" data-tf="TF3">
              <option ${p.TF3 === "D1" ? "selected" : ""}>D1</option>
              <option ${p.TF3 === "H4" ? "selected" : ""}>H4</option>
              <option ${p.TF3 === "H1" ? "selected" : ""}>H1</option>
            </select>

            <!-- SIGNALS -->
            <span class="badge ${getClass(p.TF1)}">${p.TF1}</span>
            <span class="badge ${getClass(p.TF2)}">${p.TF2}</span>
            <span class="badge ${getClass(p.TF3)}">${p.TF3}</span>

          </div>

          <div class="label">
            ${label}
          </div>
        `;

        grid.appendChild(card);
      });

    })
    .catch(err => {
      console.error("Fetch error:", err);
      document.getElementById("grid").innerHTML = "<p>Fout bij laden data...</p>";
    });
}

document.addEventListener("DOMContentLoaded", function () {
  loadData();
  setInterval(loadData, 3000);
});
</script>

</body>
</html>
