<!DOCTYPE html>
<html>
<head>
  <title>MT5 Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    /* 🔥 toggle knop */
    .topbar {
      text-align: center;
      margin-bottom: 20px;
    }

    .toggle-btn {
      background: #334155;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .toggle-btn:hover {
      background: #475569;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      padding: 15px;
      border-radius: 10px;
      background: #1e293b;
      text-align: center;
    }

    .long { border: 2px solid #22c55e; }
    .short { border: 2px solid #ef4444; }
    .mixed { border: 2px solid #64748b; }

    .tf-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin: 10px 0;
    }

    .tf-select {
      width: 100%;
      padding: 4px 20px 4px 6px;
      border-radius: 5px;
      border: none;
      background: #334155;
      color: white;
      font-size: 12px;
      text-align: center;

      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg fill='white' height='10' viewBox='0 0 20 20' width='10'><path d='M5 7l5 5 5-5z'/></svg>");
      background-repeat: no-repeat;
      background-position: right 6px center;
      background-size: 10px;
    }

    .tf-select:hover {
      background: #475569;
      cursor: pointer;
    }

    .badge {
      padding: 4px 6px;
      border-radius: 5px;
      font-size: 12px;
      width: 100%;
      box-sizing: border-box;
    }

    .buy { background: #22c55e; }
    .sell { background: #ef4444; }
    .neutral { background: #64748b; }

    .label {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>📊 Forex Trend Dashboard</h1>

<div class="topbar">
  <button class="toggle-btn" onclick="toggleMode()" id="modeBtn">
    Gebruik LIVE data
  </button>
</div>

<div class="grid" id="grid"></div>

<script>

// 🔥 mode toggle
let useLiveData = false;

// 🔥 bewaart gekozen timeframes
let selectedTF = {};

// 🔥 bewaart cards zodat we ze niet opnieuw maken
let cards = {};

function toggleMode() {
  useLiveData = !useLiveData;

  document.getElementById("modeBtn").innerText =
    useLiveData ? "Gebruik TEST data" : "Gebruik LIVE data";

  loadData();
}

function getClass(tf) {
  if (tf === "LONG") return "buy";
  if (tf === "SHORT") return "sell";
  return "neutral";
}

// 🔥 scan trigger
function triggerScan(symbol) {

  const tf1 = selectedTF[symbol]?.TF1 || "D1";
  const tf2 = selectedTF[symbol]?.TF2 || "H4";
  const tf3 = selectedTF[symbol]?.TF3 || "H1";

  fetch("/api/scan", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ symbol, tf1, tf2, tf3 })
  });

  // 🔥 wacht op MT5 update
  setTimeout(loadData, 1500);
}

// 🔥 dropdown change
document.addEventListener("change", function(e) {
  if (e.target.classList.contains("tf-select")) {

    const symbol = e.target.dataset.symbol;
    const tfKey = e.target.dataset.tf;
    const value = e.target.value;

    // opslaan
    if (!selectedTF[symbol]) selectedTF[symbol] = {};
    selectedTF[symbol][tfKey] = value;

    // 🔥 DIRECT scan starten
    triggerScan(symbol);
  }
});

function createCard(symbol) {

  const card = document.createElement("div");
  card.className = "card mixed";

  card.innerHTML = `
    <b>${symbol}</b>

    <div class="tf-grid">

      <select class="tf-select" data-symbol="${symbol}" data-tf="TF1">
        <option>D1</option>
        <option>H4</option>
        <option>H1</option>
      </select>

      <select class="tf-select" data-symbol="${symbol}" data-tf="TF2">
        <option>D1</option>
        <option>H4</option>
        <option>H1</option>
      </select>

      <select class="tf-select" data-symbol="${symbol}" data-tf="TF3">
        <option>D1</option>
        <option>H4</option>
        <option>H1</option>
      </select>

      <span class="badge">-</span>
      <span class="badge">-</span>
      <span class="badge">-</span>

    </div>

    <div class="label">MIXED</div>
  `;

  document.getElementById("grid").appendChild(card);

  cards[symbol] = card;
}

function updateCard(symbol, data) {

  const card = cards[symbol];
  if (!card) return;

  const selects = card.querySelectorAll("select");
  const badges = card.querySelectorAll(".badge");
  const label = card.querySelector(".label");

  // 🔥 gebruik user keuze of fallback
  const tf1 = selectedTF[symbol]?.TF1 || "D1";
  const tf2 = selectedTF[symbol]?.TF2 || "H4";
  const tf3 = selectedTF[symbol]?.TF3 || "H1";

  selects[0].value = tf1;
  selects[1].value = tf2;
  selects[2].value = tf3;

  const s1 = data.TF1;
  const s2 = data.TF2;
  const s3 = data.TF3;

  badges[0].innerText = s1;
  badges[1].innerText = s2;
  badges[2].innerText = s3;

  badges[0].className = "badge " + getClass(s1);
  badges[1].className = "badge " + getClass(s2);
  badges[2].className = "badge " + getClass(s3);

  let trendClass = "mixed";
  let text = "MIXED";

  if (s1 === s2 && s2 === s3) {
    if (s1 === "LONG") {
      trendClass = "long";
      text = "STRONG BUY";
    } else if (s1 === "SHORT") {
      trendClass = "short";
      text = "STRONG SELL";
    }
  }

  card.className = "card " + trendClass;
  label.innerText = text;
}

function loadData() {

  const API_URL = useLiveData
    ? "/api/signal"
    : "/data.json";

  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      if (!data || Object.keys(data).length === 0) {
        document.getElementById("grid").innerHTML = "<p>Geen data beschikbaar...</p>";
        return;
      }

      Object.keys(data).forEach(symbol => {

        // 🔥 maak card alleen als hij nog niet bestaat
        if (!cards[symbol]) {
          createCard(symbol);
        }

        updateCard(symbol, data[symbol]);
      });

    })
    .catch(err => {
      console.error("Fetch error:", err);
    });
}

document.addEventListener("DOMContentLoaded", function () {
  loadData();
  setInterval(loadData, 3000);
});

</script>

</body>
</html>
