<!DOCTYPE html>
<html>
<head>
  <title>MT5 Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      padding: 15px;
      border-radius: 10px;
      background: #1e293b;
      text-align: center;
    }

    .long { border: 2px solid #22c55e; }
    .short { border: 2px solid #ef4444; }
    .mixed { border: 2px solid #64748b; }

	.tf-grid {
	  display: grid;
	  grid-template-columns: repeat(3, 1fr);
	  text-align: center;
	  gap: 6px;
	  margin: 10px 0;
	}

    .tf-grid span:nth-child(-n+3) {
      font-size: 12px;
      opacity: 0.6;
    }

	.badge {
	  padding: 4px 6px;
	  border-radius: 5px;
	  font-size: 12px;
	  display: inline-block;
	  width: 100%;           /* 👈 dit is de fix */
	  box-sizing: border-box; /* 👈 voorkomt overflow */
	}

    .buy { background: #22c55e; }
    .sell { background: #ef4444; }
    .neutral { background: #64748b; }
  </style>
</head>

<body>

<h1>📊 Forex Trend Dashboard</h1>
<div class="grid" id="grid"></div>

<script>
function getClass(tf) {
  if (tf === "LONG") return "buy";
  if (tf === "SHORT") return "sell";
  return "neutral";
}

function loadData() {

	const API_URL = window.location.hostname === "localhost"
	  ? "/data.json"
	  : "./data.json";

  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      const grid = document.getElementById("grid");

      if (!grid) return;

      grid.innerHTML = "";

      // 🔥 fallback als geen data
      if (!data || Object.keys(data).length === 0) {
        grid.innerHTML = "<p>Geen data beschikbaar...</p>";
        return;
      }

      Object.keys(data).forEach(symbol => {
        const p = data[symbol];

        let trendClass = "mixed";
        let label = "MIXED";

        if (p.TF1 === p.TF2 && p.TF2 === p.TF3) {
          if (p.TF1 === "LONG") {
            trendClass = "long";
            label = "STRONG BUY";
          } else if (p.TF1 === "SHORT") {
            trendClass = "short";
            label = "STRONG SELL";
          }
        }

        const card = document.createElement("div");
        card.className = "card " + trendClass;

        card.innerHTML = `
          <b>${symbol}</b>

          <div class="tf-grid">
            <span>D1</span>
            <span>H4</span>
            <span>H1</span>

            <span class="badge ${getClass(p.TF1)}">${p.TF1}</span>
            <span class="badge ${getClass(p.TF2)}">${p.TF2}</span>
            <span class="badge ${getClass(p.TF3)}">${p.TF3}</span>
          </div>

          <div style="margin-top:10px;font-weight:bold;">
            ${label}
          </div>
        `;

        grid.appendChild(card);
      });

    })
    .catch(err => {
      console.error("Fetch error:", err);
      document.getElementById("grid").innerHTML = "<p>Fout bij laden data...</p>";
    });
}

document.addEventListener("DOMContentLoaded", function () {
  loadData();
  setInterval(loadData, 3000);
});
</script>

</body>
</html>
