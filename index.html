<!DOCTYPE html>
<html>
<head>
  <title>MT5 Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      padding: 15px;
      border-radius: 10px;
      background: #1e293b;
      text-align: center;
    }

    .long { border: 2px solid #22c55e; }
    .short { border: 2px solid #ef4444; }
    .mixed { border: 2px solid #64748b; }

    .tf-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      text-align: center;
      gap: 6px;
      margin: 10px 0;
    }

    .tf-select {
      width: 100%;
      padding: 4px 20px 4px 6px;
      border-radius: 5px;
      border: none;
      background: #334155;
      color: white;
      font-size: 12px;
      text-align: center;

      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;

      background-image: url("data:image/svg+xml;utf8,<svg fill='white' height='10' viewBox='0 0 20 20' width='10' xmlns='http://www.w3.org/2000/svg'><path d='M5 7l5 5 5-5z'/></svg>");
      background-repeat: no-repeat;
      background-position: right 6px center;
      background-size: 10px;
    }

    .tf-select:hover {
      background: #475569;
      cursor: pointer;
    }

    .badge {
      padding: 4px 6px;
      border-radius: 5px;
      font-size: 12px;
      display: inline-block;
      width: 100%;
      box-sizing: border-box;
    }

    .buy { background: #22c55e; }
    .sell { background: #ef4444; }
    .neutral { background: #64748b; }

    .label {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>📊 Forex Trend Dashboard</h1>
<div class="grid" id="grid"></div>

<script>

// 🔥 bewaart gekozen timeframes
let selectedTF = {};

function getClass(tf) {
  if (tf === "LONG") return "buy";
  if (tf === "SHORT") return "sell";
  return "neutral";
}

// 🔥 luister naar dropdown wijzigingen
document.addEventListener("change", function(e) {
  if (e.target.classList.contains("tf-select")) {
    const symbol = e.target.dataset.symbol;
    const tf = e.target.dataset.tf;

    if (!selectedTF[symbol]) selectedTF[symbol] = {};
    selectedTF[symbol][tf] = e.target.value;
  }
});

function loadData() {

	const API_URL = window.location.hostname === "localhost"
	  ? "/data.json"
	  : "/api/signal";

  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      const grid = document.getElementById("grid");
      if (!grid) return;

      grid.innerHTML = "";

      if (!data || Object.keys(data).length === 0) {
        grid.innerHTML = "<p>Geen data beschikbaar...</p>";
        return;
      }

      Object.keys(data).forEach(symbol => {
        const p = data[symbol];

        // 🔥 gebruik opgeslagen values
        const tf1 = selectedTF[symbol]?.TF1 || p.TF1;
        const tf2 = selectedTF[symbol]?.TF2 || p.TF2;
        const tf3 = selectedTF[symbol]?.TF3 || p.TF3;

        let trendClass = "mixed";
        let label = "MIXED";

        if (tf1 === tf2 && tf2 === tf3) {
          if (tf1 === "LONG") {
            trendClass = "long";
            label = "STRONG BUY";
          } else if (tf1 === "SHORT") {
            trendClass = "short";
            label = "STRONG SELL";
          }
        }

        const card = document.createElement("div");
        card.className = "card " + trendClass;

        card.innerHTML = `
          <b>${symbol}</b>

          <div class="tf-grid">

            <!-- SELECTORS -->
            <select class="tf-select" data-symbol="${symbol}" data-tf="TF1">
              <option ${tf1 === "D1" ? "selected" : ""}>D1</option>
              <option ${tf1 === "H4" ? "selected" : ""}>H4</option>
              <option ${tf1 === "H1" ? "selected" : ""}>H1</option>
            </select>

            <select class="tf-select" data-symbol="${symbol}" data-tf="TF2">
              <option ${tf2 === "D1" ? "selected" : ""}>D1</option>
              <option ${tf2 === "H4" ? "selected" : ""}>H4</option>
              <option ${tf2 === "H1" ? "selected" : ""}>H1</option>
            </select>

            <select class="tf-select" data-symbol="${symbol}" data-tf="TF3">
              <option ${tf3 === "D1" ? "selected" : ""}>D1</option>
              <option ${tf3 === "H4" ? "selected" : ""}>H4</option>
              <option ${tf3 === "H1" ? "selected" : ""}>H1</option>
            </select>

            <!-- SIGNALS -->
            <span class="badge ${getClass(tf1)}">${tf1}</span>
            <span class="badge ${getClass(tf2)}">${tf2}</span>
            <span class="badge ${getClass(tf3)}">${tf3}</span>

          </div>

          <div class="label">
            ${label}
          </div>
        `;

        grid.appendChild(card);
      });

    })
    .catch(err => {
      console.error("Fetch error:", err);
      document.getElementById("grid").innerHTML = "<p>Fout bij laden data...</p>";
    });
}

document.addEventListener("DOMContentLoaded", function () {
  loadData();
  setInterval(loadData, 3000);
});
</script>

</body>
</html>
